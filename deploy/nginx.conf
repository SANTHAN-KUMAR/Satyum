# Satyum single-origin reverse proxy (CLAUDE.md §11). nginx serves the built React app and proxies
# /api and /ws to the backend service, so the browser sees ONE origin — no CORS, no split-host config,
# and the camera WebSocket works (Vercel-style HTTP rewrites cannot proxy WebSockets; nginx can).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Match the backend's 25 MiB upload cap so nginx rejects oversize bodies consistently.
    client_max_body_size 25m;

    # REST API -> backend.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Live-capture WebSocket -> backend (HTTP/1.1 Upgrade).
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
    }

    # Single-page app: unknown routes fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
